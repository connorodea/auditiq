# AuditIQ — aiaudits.dev
# Nginx reverse proxy with wildcard subdomain support

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=auditiq_api:10m rate=20r/s;

# Upstream definitions
upstream auditiq_frontend {
    server 127.0.0.1:3900;
}

upstream auditiq_backend {
    server 127.0.0.1:8900;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name aiaudits.dev *.aiaudits.dev;
    return 301 https://$host$request_uri;
}

# Main app + wildcard subdomains
server {
    listen 443 ssl http2;
    server_name aiaudits.dev *.aiaudits.dev;

    ssl_certificate /etc/letsencrypt/live/aiaudits.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiaudits.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend (Next.js)
    location / {
        proxy_pass http://auditiq_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://auditiq_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# API subdomain
server {
    listen 443 ssl http2;
    server_name api.aiaudits.dev;

    ssl_certificate /etc/letsencrypt/live/aiaudits.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiaudits.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # API rate limiting
    location /api/ {
        limit_req zone=auditiq_api burst=40 nodelay;
        proxy_pass http://auditiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for frontend
        add_header Access-Control-Allow-Origin "https://aiaudits.dev" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Stripe webhook (no CORS, no rate limit)
    location /api/v1/payments/webhook {
        proxy_pass http://auditiq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://aiaudits.dev$request_uri;
    }
}
